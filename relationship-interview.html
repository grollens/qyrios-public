<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Relationship Interview</title>
  <link href="https://cdn.jsdelivr.net/npm/@n8n/chat/dist/style.css" rel="stylesheet" />
  <style>
    :root {
      --chat--color-primary: #0ea5e9;
      --chat--color-primary-shade-50: #0284c7;
      --chat--color-primary-shade-100: #0369a1;
      --chat--color-secondary: #0c4a6e;
      --chat--color-secondary-shade-50: #164e63;
      --chat--color-white: #ffffff;
      --chat--color-light: #f8fafc;
      --chat--color-light-shade-50: #f1f5f9;
      --chat--color-medium: #94a3b8;
      --chat--color-dark: #1e293b;
      --chat--color-disabled: #cbd5e1;
      --chat--color-typing: #94a3b8;
      --chat--spacing: 1rem;
      --chat--border-radius: 1rem;
      --chat--transition-duration: 0.15s;
      --chat--window-width: 100%;
      --chat--window-height: calc(100vh - 120px);
      --chat--header-height: 0;
      --chat--textarea-height: auto;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(160deg, #f0f9ff 0%, #e0f2fe 30%, #bae6fd 70%, #7dd3fc 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 1.5rem;
    }

    .interview-container {
      width: 100%;
      max-width: 640px;
      background: #ffffff;
      border-radius: 1.25rem;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.07), 0 2px 4px -2px rgba(0,0,0,0.05), 0 0 0 1px rgba(0,0,0,0.03);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      max-height: calc(100vh - 3rem);
    }

    .interview-header {
      padding: 1.5rem 1.75rem 1.25rem;
      border-bottom: 1px solid #f1f5f9;
    }

    .interview-title {
      font-size: 1.25rem;
      font-weight: 600;
      color: #1e293b;
      margin-bottom: 0.35rem;
      line-height: 1.3;
    }

    .interview-topic {
      font-size: 0.875rem;
      color: #64748b;
      font-weight: 400;
    }

    .chat-wrapper {
      flex: 1;
      overflow: hidden;
      min-height: 400px;
    }

    #n8n-chat { width: 100%; height: 100%; }

    .n8n-chat__window { border: none !important; border-radius: 0 !important; box-shadow: none !important; }
    .n8n-chat__messages { padding: 1rem 1.5rem !important; }

    .n8n-chat__message--bot .n8n-chat__message-content {
      background: #f0f9ff !important;
      border: 1px solid #bae6fd !important;
      color: #334155 !important;
    }

    .n8n-chat__message--user .n8n-chat__message-content {
      background: #0ea5e9 !important;
      color: white !important;
    }

    .n8n-chat__input-wrapper {
      border-top: 1px solid #f1f5f9 !important;
      padding: 1rem 1.5rem !important;
      background: #ffffff !important;
    }

    .n8n-chat__input, .n8n-chat__textarea {
      border: 1px solid #e2e8f0 !important;
      border-radius: 0.75rem !important;
      padding: 0.875rem 1rem !important;
      font-size: 1rem !important;
      background: #f8fafc !important;
      min-height: 2.75rem !important;
      max-height: 10rem !important;
      resize: vertical !important;
      line-height: 1.5 !important;
      overflow-y: auto !important;
      field-sizing: content !important;
    }

    .n8n-chat__input:focus, .n8n-chat__textarea:focus {
      border-color: #0ea5e9 !important;
      box-shadow: 0 0 0 3px rgba(14,165,233,0.1) !important;
      background: #ffffff !important;
    }

    .n8n-chat__send-button {
      background: #0ea5e9 !important;
      border-radius: 0.625rem !important;
    }

    .n8n-chat__send-button:hover { background: #0284c7 !important; }

    .n8n-chat__powered-by, [class*="powered-by"], [class*="poweredBy"] { display: none !important; }

    .error-container {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100vh; padding: 2rem; text-align: center;
    }
    .error-container h1 { font-size: 1.25rem; font-weight: 600; margin-bottom: 0.75rem; color: #dc2626; }
    .error-container p { color: #64748b; max-width: 360px; line-height: 1.6; }

    .loading {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100vh; gap: 1rem;
    }
    .loading-spinner {
      width: 36px; height: 36px; border: 3px solid #e2e8f0; border-top-color: #0ea5e9;
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading p { color: #64748b; font-size: 0.9375rem; }

    @media (max-width: 640px) {
      body { padding: 0; }
      .interview-container { border-radius: 0; max-height: 100vh; height: 100vh; }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="loading">
      <div class="loading-spinner"></div>
      <p>Laddar dialog...</p>
    </div>
  </div>

  <script type="module">
    import { createChat } from 'https://cdn.jsdelivr.net/npm/@n8n/chat/dist/chat.bundle.es.js';

    const app = document.getElementById('app');
    const params = new URLSearchParams(window.location.search);
    const draftId = params.get('draftId');
    const contactId = params.get('contactId');
    const name = params.get('name') || 'Kontakt';

    if (!draftId || !contactId) {
      app.innerHTML = `
        <div class="error-container">
          <h1>Saknar parametrar</h1>
          <p>Inget draftId eller contactId hittades i URL:en. Öppna denna sida via länken i Slack.</p>
        </div>
      `;
    } else {
      app.innerHTML = `
        <div class="interview-container">
          <div class="interview-header">
            <h1 class="interview-title">Dialog med ${escapeHtml(name)}</h1>
            <p class="interview-topic">Förfina kommentarsförslag tillsammans</p>
          </div>
          <div class="chat-wrapper">
            <div id="n8n-chat"></div>
          </div>
        </div>
      `;

      try {
        // RC-3.3 Chat Trigger webhook URL (will be set after workflow creation)
        const webhookUrl = 'https://qyrios.app.n8n.cloud/webhook/rc-relationship-interview/chat';

        createChat({
          webhookUrl: webhookUrl,
          target: '#n8n-chat',
          mode: 'fullscreen',
          showWelcomeScreen: false,
          initialMessages: [
            `Laddar kontext för ${escapeHtml(name)}...`
          ],
          metadata: {
            draftId: draftId,
            contactId: contactId
          },
          i18n: {
            en: {
              title: '',
              subtitle: '',
              inputPlaceholder: 'Skriv ditt svar här...',
              getStarted: 'Börja dialogen',
              closeButtonTooltip: 'Stäng'
            }
          }
        });

        console.log('Chat initialized for contact:', name, 'draftId:', draftId);
      } catch (error) {
        console.error('Failed to initialize chat:', error);
        document.querySelector('.chat-wrapper').innerHTML = `
          <div class="error-container" style="min-height: auto; padding: 3rem;">
            <h1>Kunde inte ladda chatten</h1>
            <p>Ett fel uppstod: ${error.message}</p>
            <p>Försök ladda om sidan.</p>
          </div>
        `;
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
  </script>
</body>
</html>
